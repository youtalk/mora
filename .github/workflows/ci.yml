name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: swift-format
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads (swift-format)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-swift-format-v1
          restore-keys: |
            brew-${{ runner.os }}-swift-format-

      - name: Install swift-format
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install swift-format

      - name: Show versions
        run: |
          swift --version
          swift-format --version
          brew list --versions swift-format

      - name: swift-format lint
        # Package.swift is excluded because swift-format's built-in
        # TrailingComma pretty-printer rule conflicts with the repo
        # convention of keeping trailing commas on every element.
        run: swift-format lint --strict --recursive Mora Packages/*/Sources Packages/*/Tests

      - name: Source gate — no cloud pronunciation SDK
        # No github-context expressions used; only a static grep over tracked
        # source. Scoped to the shipped tree (Mora, Packages) so dev-tools and
        # docs are free to discuss these vendors.
        run: |
          if git grep -nIE 'speechace|azure\.cognitive|pronunciation-assessment|speechsuper' -- Mora Packages; then
            echo "Cloud pronunciation reference detected in shipped source tree"
            exit 1
          fi

  build-test:
    name: Build / Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads (xcodegen)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-xcodegen-v1
          restore-keys: |
            brew-${{ runner.os }}-xcodegen-

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodegen --version
          brew list --versions xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache Xcode DerivedData (Mora app)
        uses: actions/cache@v4
        with:
          # Exclude ModuleCache.noindex / SDKStatCaches.noindex to avoid "module file
          # has been modified" errors from cross-runner SDK mtime drift.
          path: |
            ~/Library/Developer/Xcode/DerivedData
            !~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            !~/Library/Developer/Xcode/DerivedData/SDKStatCaches.noindex
          key: xcode-deriveddata-mora-v2-${{ runner.os }}-${{ hashFiles('project.yml', 'Packages/*/Package.swift', 'Mora/**/*.swift', 'Packages/*/Sources/**/*.swift') }}
          restore-keys: |
            xcode-deriveddata-mora-v2-${{ runner.os }}-

      - name: Build Mora (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Mora.xcodeproj \
            -scheme Mora \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Binary gate — no cloud symbols in built binary
        # No github-context expressions used; only nm over the freshly built
        # .app. Rejects any symbol whose name suggests the app was linked
        # against a cloud pronunciation SDK.
        run: |
          BIN="$HOME/Library/Developer/Xcode/DerivedData"
          APP=$(find "$BIN" -type d -name 'Mora.app' -path '*Debug-iphonesimulator*' 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "Mora.app not found in DerivedData"
            exit 1
          fi
          if nm "$APP/Mora" 2>/dev/null | grep -iE 'speechace|azure|speechsuper'; then
            echo "Cloud pronunciation symbol detected in Mora binary"
            exit 1
          fi

      # SPM .build caches per local package. hashFiles includes the package's own
      # sources and those of every package it depends on, so any upstream source
      # change invalidates the cache. Prefix restore-keys let near-miss PRs still
      # pick up the closest match and let Swift's incremental build fill the delta.
      - name: Cache SwiftPM .build (MoraCore)
        uses: actions/cache@v4
        with:
          path: Packages/MoraCore/.build
          key: spm-MoraCore-${{ runner.os }}-${{ hashFiles('Packages/MoraCore/**/*.swift', 'Packages/MoraCore/Package.swift') }}
          restore-keys: |
            spm-MoraCore-${{ runner.os }}-

      - name: Cache SwiftPM .build (MoraEngines)
        uses: actions/cache@v4
        with:
          path: Packages/MoraEngines/.build
          key: spm-MoraEngines-${{ runner.os }}-${{ hashFiles('Packages/MoraCore/**/*.swift', 'Packages/MoraCore/Package.swift', 'Packages/MoraEngines/**/*.swift', 'Packages/MoraEngines/Package.swift') }}
          restore-keys: |
            spm-MoraEngines-${{ runner.os }}-

      - name: Cache SwiftPM .build (MoraUI)
        uses: actions/cache@v4
        with:
          path: Packages/MoraUI/.build
          key: spm-MoraUI-${{ runner.os }}-${{ hashFiles('Packages/MoraCore/**/*.swift', 'Packages/MoraCore/Package.swift', 'Packages/MoraEngines/**/*.swift', 'Packages/MoraEngines/Package.swift', 'Packages/MoraUI/**/*.swift', 'Packages/MoraUI/Package.swift') }}
          restore-keys: |
            spm-MoraUI-${{ runner.os }}-

      - name: Cache SwiftPM .build (MoraTesting)
        uses: actions/cache@v4
        with:
          path: Packages/MoraTesting/.build
          key: spm-MoraTesting-${{ runner.os }}-${{ hashFiles('Packages/MoraCore/**/*.swift', 'Packages/MoraCore/Package.swift', 'Packages/MoraEngines/**/*.swift', 'Packages/MoraEngines/Package.swift', 'Packages/MoraTesting/**/*.swift', 'Packages/MoraTesting/Package.swift') }}
          restore-keys: |
            spm-MoraTesting-${{ runner.os }}-

      - name: Test SPM packages
        run: |
          set -e
          for pkg in MoraCore MoraEngines MoraUI MoraTesting; do
            echo "::group::swift test — $pkg"
            (cd Packages/$pkg && swift test)
            echo "::endgroup::"
          done

      - name: Cache SwiftPM .build (MoraMLX)
        uses: actions/cache@v4
        with:
          path: Packages/MoraMLX/.build
          key: spm-MoraMLX-${{ runner.os }}-${{ hashFiles('Packages/MoraMLX/**/*.swift', 'Packages/MoraMLX/Package.swift') }}
          restore-keys: |
            spm-MoraMLX-${{ runner.os }}-

      - name: Build MoraMLX (no test target)
        run: |
          echo "::group::swift build — MoraMLX"
          (cd Packages/MoraMLX && swift build)
          echo "::endgroup::"

  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bench:
              - 'bench/**'
              - '.github/workflows/ci.yml'

  bench-build:
    name: Bench Build / Test
    needs: changes
    if: ${{ needs.changes.outputs.bench == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads (xcodegen)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-xcodegen-v1
          restore-keys: |
            brew-${{ runner.os }}-xcodegen-

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      - name: Generate bench project
        working-directory: bench
        run: xcodegen generate

      # Biggest single cache win: bench pulls heavy MLX / HuggingFace / swift-transformers
      # SPM packages. Keying on bench/project.yml invalidates on pin bumps; source-only
      # changes fall through to the restore-key and reuse the dependency builds.
      # ModuleCache.noindex and SDKStatCaches.noindex are excluded because their .pcm
      # files record SDK-file mtimes that don't match across runner instances; restoring
      # them causes "module file ... has been modified" errors on C-module dependencies
      # like swift-nio's CNIO* targets.
      - name: Cache Xcode DerivedData (bench)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            !~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            !~/Library/Developer/Xcode/DerivedData/SDKStatCaches.noindex
          key: xcode-deriveddata-bench-v2-${{ runner.os }}-${{ hashFiles('bench/project.yml', 'bench/MoraBench/**/*.swift', 'bench/MoraBenchTests/**/*.swift') }}
          restore-keys: |
            xcode-deriveddata-bench-v2-${{ runner.os }}-

      - name: Build MoraBench (iOS Simulator)
        working-directory: bench
        run: |
          set -o pipefail
          xcodebuild build \
            -project 'Mora Bench.xcodeproj' \
            -scheme MoraBench \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Build MoraBench (Mac Catalyst)
        working-directory: bench
        run: |
          set -o pipefail
          xcodebuild build \
            -project 'Mora Bench.xcodeproj' \
            -scheme MoraBench \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration Debug \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Pick iPad simulator
        id: sim
        run: |
          # simctl lines look like: "    iPad Pro 13-inch (M5) (UUID) (Shutdown)"
          # We want the device name including any generation suffix, so strip
          # only the UUID paren and the state paren, not inner parens like (M5).
          NAME=$(xcrun simctl list devices available \
            | grep -iE 'iPad' \
            | head -1 \
            | sed -E 's/^[[:space:]]*(.+) \([0-9A-Fa-f-]{36}\) \([A-Za-z]+\)[[:space:]]*$/\1/')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $NAME"

      - name: Test MoraBench
        working-directory: bench
        env:
          SIM_NAME: ${{ steps.sim.outputs.name }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project 'Mora Bench.xcodeproj' \
            -scheme MoraBench \
            -destination "platform=iOS Simulator,name=${SIM_NAME},OS=latest" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
