name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install swift-format xcodegen

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          swift-format --version
          xcodegen --version
          brew list --versions swift-format xcodegen

      - name: swift-format lint
        # Package.swift is excluded because swift-format's built-in
        # TrailingComma pretty-printer rule conflicts with the repo
        # convention of keeping trailing commas on every element.
        run: swift-format lint --strict --recursive Mora Packages/*/Sources Packages/*/Tests

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Mora (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Mora.xcodeproj \
            -scheme Mora \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test SPM packages
        run: |
          set -e
          for pkg in MoraCore MoraEngines MoraUI MoraTesting; do
            echo "::group::swift test — $pkg"
            (cd Packages/$pkg && swift test)
            echo "::endgroup::"
          done

      - name: Build MoraMLX (no test target)
        run: |
          echo "::group::swift build — MoraMLX"
          (cd Packages/MoraMLX && swift build)
          echo "::endgroup::"
