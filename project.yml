name: Mora
options:
  bundleIdPrefix: tech.reenable
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  MoraCore:
    path: Packages/MoraCore
  MoraEngines:
    path: Packages/MoraEngines
  MoraUI:
    path: Packages/MoraUI
  MoraTesting:
    path: Packages/MoraTesting
  MoraMLX:
    path: Packages/MoraMLX
targets:
  Mora:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Mora
    resources:
      - path: Mora/Assets.xcassets
    dependencies:
      - package: MoraCore
      - package: MoraEngines
      - package: MoraUI
      - package: MoraTesting
      - package: MoraMLX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.reenable.Mora
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "mora listens when you read aloud during practice."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "mora recognizes the words you read so it can score them."
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
