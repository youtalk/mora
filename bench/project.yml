name: Mora Bench
options:
  bundleIdPrefix: tech.reenable
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
targets:
  MoraBench:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoraBench
    resources:
      - path: MoraBench/Assets.xcassets
      - path: MoraBench/Prompts/Resources
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.reenable.MoraBench
        TARGETED_DEVICE_FAMILY: "2,6"
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        MACOSX_DEPLOYMENT_TARGET[sdk=macosx*]: "14.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: MoraBench/MoraBench.entitlements
  MoraBenchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoraBenchTests
    dependencies:
      - target: MoraBench
schemes:
  MoraBench:
    build:
      targets:
        MoraBench: all
        MoraBenchTests: [test]
    test:
      targets:
        - MoraBenchTests
